# ------------------------------------------------------------------------------
# BUBBLE 2026 THEME PACK - HEADER MOD (dev)
# ------------------------------------------------------------------------------
# Header widoczny na mobile. Import w HA: themes/bubble_2026-dev.yaml
# ------------------------------------------------------------------------------

# ==============================================================================
# (SHARED) - Header mod: header widoczny na mobile
# ==============================================================================
x-bubble-shared: &bubble_shared
  card-mod-root-yaml: |
    .: |
      @media only screen and (max-width: 768px) {
          #view { padding-top: 0 !important; margin-top: 0 !important; height: calc(100vh - env(safe-area-inset-top)) !important; }
      }
  card-mod-more-info-yaml: |
    $: |
     .mdc-dialog .mdc-dialog__scrim { backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); background: rgba(0,0,0,.6); }
     .mdc-dialog .mdc-dialog__container .mdc-dialog__surface { box-shadow: none !important; border-radius: var(--ha-card-border-radius); }
    .: |
     :host { --ha-card-box-shadow: none; }
  card-mod-view-yaml: |
    hui-sidebar-view:
      $: |
        .container { overflow: hidden; }
        @media only screen and (min-width: 768px) { .container { max-width: 520px; margin: auto !important; width: -webkit-fill-available; } }
        #wrapper: |
          $: |
            #progressContainer { border-radius: 14px !important; }
      .: |
        hui-view { transform: translate3d(0px, -60px, 0px); }
        "#view>hui-view>hui-sidebar-view$#main>hui-card-options:nth-child(7)>vertical-stack-in-card$ha-card>div>hui-horizontal-stack-card$#root>hui-grid-card$#root>hui-entities-card$#states>div:nth-child(4)>slider-entity-row$div>ha-slider$#sliderBar$#progressContainer" { border-radius: 14px !important; }
  card-mod-card: |
    ha-card {
      transition: none;
      border-style: none !important;
      --bubble-text-on-accent: var(--token-text-on-accent);
    }
    .is-light .bubble-range-fill,
    .is-light .slider-use-light-color {
      opacity: 0.6;
      filter: saturate(0.7);
    }
  $: |
    .bubble-button-card-container {
      --primary-text-color: var(--token-text);
      color: var(--token-text) !important;
    }
    /* Tekst na tle accent – przycisk, sub-button, slider (background-on = tło accent) */
    .bubble-button-card-container[style*="background-color"],
    .bubble-button-card-container.background-on,
    .bubble-sub-button[style*="background-color"],
    .bubble-sub-button[style*="bubble-accent-color"],
    .bubble-sub-button[style*="bubble-sub-button-light-background-color"],
    .bubble-sub-button.background-on {
      --primary-text-color: var(--token-text-on-accent) !important;
      --bubble-icon-color: var(--token-text-on-accent) !important;
      --bubble-name-color: var(--token-text-on-accent) !important;
      --bubble-state-color: var(--token-text-on-accent) !important;
      color: var(--token-text-on-accent) !important;
    }
    .bubble-sub-button.background-on .bubble-sub-button-name-container,
    .bubble-sub-button.background-on .bubble-sub-button-icon,
    .bubble-sub-button[style*="bubble-accent-color"] .bubble-sub-button-name-container,
    .bubble-sub-button[style*="bubble-accent-color"] .bubble-sub-button-icon {
      color: var(--token-text-on-accent) !important;
    }
    ha-icon {
      color: inherit !important;
    }
  card-mod-card-yaml: |
    "ha-card$": |
      .bubble-sub-button.background-on,
      .bubble-sub-button[style*="bubble-accent-color"],
      .bubble-sub-button[style*="bubble-sub-button-light-background-color"] {
        --primary-text-color: var(--token-text-on-accent) !important;
        --bubble-icon-color: var(--token-text-on-accent) !important;
        --bubble-name-color: var(--token-text-on-accent) !important;
        --bubble-state-color: var(--token-text-on-accent) !important;
        color: var(--token-text-on-accent) !important;
      }

      .bubble-sub-button.background-on .bubble-sub-button-name-container,
      .bubble-sub-button.background-on ha-icon,
      .bubble-sub-button[style*="bubble-accent-color"] .bubble-sub-button-name-container,
      .bubble-sub-button[style*="bubble-accent-color"] ha-icon {
        color: var(--token-text-on-accent) !important;
      }

    "hui-element$ha-card$": |
      .bubble-sub-button.background-on,
      .bubble-sub-button[style*="bubble-accent-color"] {
        --primary-text-color: var(--token-text-on-accent) !important;
        color: var(--token-text-on-accent) !important;
      }


