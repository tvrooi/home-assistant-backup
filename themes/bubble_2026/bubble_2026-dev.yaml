  ha-heading-card-title-font-size: var(--token-size-font-title-card)
  ha-heading-card-title-font-weight: var(--token-weight-font-title-card)
  ## Font Smoothing
  ha-font-smoothing: antialiased
  webkit-font-smoothing: antialiased
  ## Font Weight Tokens
  ha-font-weight-normal: var(--token-weight-font-body)
  ha-font-weight-medium: var(--token-weight-font-title)
  ha-font-weight-bold: var(--token-weight-font-title)
  ha-font-weight-body: var(--token-weight-font-body)
  ha-font-weight-heading: var(--token-weight-font-title)
  ha-font-weight-action: var(--token-weight-font-title)
  ## ::Legacy:: Font Weight
  mdc-typography-button-font-weight: var(--token-weight-font-title)
  title-font-weight: var(--token-weight-font-title)
  ## Font Size Tokens
  ha-font-size-xs: var(--token-size-font-xs)
  ha-font-size-s: var(--token-size-font-s)
  ha-font-size-m: var(--token-size-font-m)
  ha-font-size-l: var(--token-size-font-l)
  ha-font-size-xl: var(--token-size-font-xl)
  ha-font-size-2xl: var(--token-size-font-2xl)
  ha-font-size-3xl: var(--token-size-font-3xl)
  ha-font-size-4xl: var(--token-size-font-4xl)
  ha-font-size-5xl: var(--token-size-font-5xl)

  # ------------------------------------------------------------------------------
  # Extensions
  # ------------------------------------------------------------------------------
  mcg-title-font-weight: 400
  mush-title-font-weight: var(--title-font-weight)
  mush-title-font-size: var(--title-font-size)
  
  # ----------------------------------------------------------------------------
  # CORE MAPPING
  # ----------------------------------------------------------------------------
  primary-color: "var(--token-accent)"
  accent-color: "var(--token-accent)"

  # Text Colors
  text-color: "var(--token-text)"
  primary-text-color: "var(--token-text)"
  secondary-text-color: "var(--token-text-secondary)"
  pbs-button-color: "var(--token-text)"
  pbs-button-rgb-color: "var(--token-text)"
  pbs-button-rgb-state-color: "var(--token-text)"
  pbs-button-rgb-default-color: "var(--token-text)"
  rgb-state-default-color: "var(--token-text)"
  pbs-button-rgb-fallback: "var(--token-text)"

  # CRITICAL FIX: Explicitly controls text color on active elements
  text-primary-color: var(--token-text-on-accent)

  # Backgrounds
  background-color: var(--token-bg)
  primary-background-color: var(--token-bg)
  secondary-background-color: var(--token-bg-secondary)
  ha-card-background: var(--token-card)
  card-background-color: var(--token-card)

  # Header
  app-header-background-color: var(--token-bg)
  app-header-text-color: var(--token-text)

  # Sidebar
  sidebar-background-color: var(--token-bg)
  sidebar-text-color: var(--token-text)
  sidebar-icon-color: var(--token-sidebar-icon)
  sidebar-selected-icon-color: var(--token-accent)
  sidebar-selected-text-color: var(--token-text)
  divider-color: var(--token-bg)

  # Controls
  switch-checked-button-color: var(--token-accent)
