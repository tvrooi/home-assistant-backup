# Home Assistant Template Sensors
# Cleaned up: 2026-02-28

# =========================================================================
# Media Tracking - Active Speaker Detection
# =========================================================================
- sensor:
    - name: "Active Speaker"
      unique_id: active_speaker
      state: >
        {% set speakers = [
          'media_player.sonos',
          'media_player.tristans_wifi',
          'media_player.dining_room_wifi',
          'media_player.tristans_google_mini',
          'media_player.junos_room_speaker'
        ] %}
        {% for speaker in speakers %}
          {% if states(speaker) == 'playing' %}
            {{ speaker }}
          {% endif %}
        {% endfor %}
        {% if states('media_player.sonos') not in ['off', 'idle', 'unavailable'] %}
          media_player.sonos
        {% elif states('media_player.tristans_wifi') not in ['off', 'idle', 'unavailable'] %}
          media_player.tristans_wifi
        {% else %}
          media_player.sonos
        {% endif %}
      attributes:
        media_title: >
          {{ state_attr(states('sensor.active_speaker'), 'media_title') }}
        media_artist: >
          {{ state_attr(states('sensor.active_speaker'), 'media_artist') }}
        media_album_name: >
          {{ state_attr(states('sensor.active_speaker'), 'media_album_name') }}
        entity_picture: >
          {{ state_attr(states('sensor.active_speaker'), 'entity_picture') }}

# =========================================================================
# Media Tracking - Sonos
# =========================================================================
- sensor:
    - name: "Sonos Media Position"
      unique_id: sonos_media_position
      state: >
        {% set pos = state_attr('media_player.sonos', 'media_position') %}
        {% if pos %}
          {{ pos | timestamp_custom('%M:%S', false) }}
        {% else %}
          0:00
        {% endif %}

    - name: "Sonos Media Duration"
      unique_id: sonos_media_duration
      state: >
        {% set dur = state_attr('media_player.sonos', 'media_duration') %}
        {% if dur %}
          {{ dur | timestamp_custom('%M:%S', false) }}
        {% else %}
          0:00
        {% endif %}

    - name: "Sonos Media Remaining"
      unique_id: sonos_media_remaining
      state: >
        {% set pos = state_attr('media_player.sonos', 'media_position') %}
        {% set dur = state_attr('media_player.sonos', 'media_duration') %}
        {% if pos and dur %}
          {% set remaining = dur - pos %}
          {{ remaining | timestamp_custom('%M:%S', false) }}
        {% else %}
          0:00
        {% endif %}

