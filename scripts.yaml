  description: Animated RGB color cycling
  sequence:
  - target:
      entity_id: input_boolean.zephyr_dynamic_scene
    action: input_boolean.turn_on
  - repeat:
      while:
      - condition: state
        entity_id: input_boolean.zephyr_dynamic_scene
        state: 'on'
      sequence:
