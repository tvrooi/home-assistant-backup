dashboard_apply_theme:
  alias: Dashboard Apply Theme
  description: Reads the current theme selection and dark mode toggle, applies the
    matching HA theme
  mode: restart
  sequence:
  - variables:
      theme_name: '{% set m = {''Day'': ''selsker-day'', ''Night'': ''selsker-night'',
        ''Graphite'': ''Graphite Auto'', ''Liquid Glass'': ''Liquid Glass'', ''Material
        You'': ''Material You'', ''Frosted Glass'': ''Frosted Glass'', ''Frosted Glass
        Dark'': ''Frosted Glass Dark'', ''Frosted Glass Dark Lite'': ''Frosted Glass
        Dark Lite'', ''Frosted Glass Light'': ''Frosted Glass Light'', ''Frosted Glass
        Light Lite'': ''Frosted Glass Light Lite'', ''Frosted Glass Lite'': ''Frosted
        Glass Lite'', ''Minimalist Desktop'': ''minimalist-desktop'', ''Minimalist
        Mobile'': ''minimalist-mobile'', ''Minimalist iOS'': ''minimalist-ios-tapbar'',
        ''Minimalist Tapbar'': ''minimalist-mobile-tapbar'', ''Bubble 2026'': ''Bubble
        2026'', ''Bubble BFG'': ''Bubble 2026 BFG'', ''Bubble Dracula'': ''Bubble
        Dracula'', ''Bubble Nord'': ''Bubble Nord'', ''Bubble Catppuccin'': ''Bubble
        Catppuccin Macchiato'', ''Bubble Tokyo Night'': ''Bubble Tokyo Night'', ''Bubble
        Gruvbox'': ''Bubble Gruvbox'', ''Bubble Cyberpunk'': ''Bubble Cyberpunk'',
        ''Bubble Minimal'': ''Bubble Minimal'', ''Bubble Latte'': ''Bubble Latte'',
        ''Dubble Dracula'': ''Dubble Dracula'', ''Dubble Nord'': ''Dubble Nord''}
        %}

        {{ m.get(states(''input_select.dashboard_theme''), ''selsker-day'') }}'
      theme_mode: '{{ ''dark'' if is_state(''input_boolean.dashboard_dark_mode'',
        ''on'') else ''light'' }}'
  - action: frontend.set_theme
    data:
      name: '{{ theme_name }}'
      mode: '{{ theme_mode }}'
tristan_bedroom_honolulu_sunset:
  alias: Tristan Bedroom - Honolulu Beach Sunset (60 min)
  description: Smooth 1-hour color transition through coral, orange, pink, and purple
    sunset colors
  mode: single
  sequence:
  - target:
      entity_id:
      - light.tristan_right_bedside
      - light.tristan_desk_colour
    data:
      hs_color:
      - 28
      - 100
      brightness: 254
      transition: 480
    action: light.turn_on
  - action: light.turn_on
    target:
      entity_id: light.tristan_left_bedside
    data:
      color_temp_kelvin: 2000
      brightness: 254
      transition: 480
  - delay:
      seconds: 480
  - target:
      entity_id:
      - light.tristan_right_bedside
      - light.tristan_desk_colour
    data:
      hs_color:
      - 35
      - 95
      transition: 480
    action: light.turn_on
  - delay:
      seconds: 480
  - target:
      entity_id:
      - light.tristan_right_bedside
      - light.tristan_desk_colour
    data:
      hs_color:
      - 30
      - 90
      transition: 480
    action: light.turn_on
  - delay:
      seconds: 480
  - target:
      entity_id:
      - light.tristan_right_bedside
      - light.tristan_desk_colour
    data:
      hs_color:
      - 8
      - 95
      transition: 480
    action: light.turn_on
  - action: light.turn_on
    target:
      entity_id: light.tristan_left_bedside
    data:
      color_temp_kelvin: 2200
      transition: 480
  - delay:
      seconds: 480
  - target:
      entity_id:
      - light.tristan_right_bedside
      - light.tristan_desk_colour
    data:
      hs_color:
      - 355
      - 85
      transition: 480
    action: light.turn_on
  - delay:
      seconds: 480
  - target:
      entity_id:
      - light.tristan_right_bedside
      - light.tristan_desk_colour
    data:
      hs_color:
      - 310
      - 90
      transition: 480
    action: light.turn_on
  - delay:
      seconds: 480
  - target:
      entity_id:
      - light.tristan_right_bedside
      - light.tristan_desk_colour
    data:
      hs_color:
      - 280
      - 95
      transition: 480
    action: light.turn_on
  - action: light.turn_on
    target:
      entity_id: light.tristan_left_bedside
    data:
      color_temp_kelvin: 2500
      transition: 480
  - delay:
      seconds: 480
  - target:
      entity_id:
      - light.tristan_right_bedside
      - light.tristan_desk_colour
