tristan_dynamic_scene_start:
  alias: Tristan Bedroom - Dynamic Scene Start
  icon: mdi:motion-play
  mode: restart
  description: Animated color-changing lights
  sequence:
  - target:
      entity_id: input_boolean.tristan_dynamic_scene
    action: input_boolean.turn_on
  - target:
      entity_id:
      - light.tristan_left_bedside
      - light.tristan_desk_colour
    data:
      brightness_pct: 25
      transition: 5
    action: light.turn_on
  - variables:
      hue: 0
  - repeat:
      while:
      - condition: state
        entity_id: input_boolean.tristan_dynamic_scene
        state: 'on'
      sequence:
      - target:
          entity_id: light.tristan_right_bedside
        data:
          hs_color:
          - '{{ hue }}'
          - 85
          brightness_pct: 55
          transition: 20
        action: light.turn_on
      - delay: 00:00:20
      - variables:
          hue: '{{ (hue + 18) % 360 }}'
tristan_dynamic_scene_stop:
  alias: Tristan Bedroom - Dynamic Scene Stop
  icon: mdi:motion-pause
  mode: single
  sequence:
  - target:
      entity_id: input_boolean.tristan_dynamic_scene
    action: input_boolean.turn_off
tristan_desk_apply_preset:
  alias: Tristan Bedroom - Desk Lamp Apply Preset
  icon: mdi:desk-lamp
  mode: queued
  fields:
    rgb:
      description: RGB list like [255,0,0]
      example: '[244, 67, 54]'
    kelvin:
      description: Color temperature in kelvin
      example: '2700'
    brightness:
      description: Brightness percentage
      example: '50'
  sequence:
  - variables:
      b: '{{ state_attr(''light.tristan_right_bedside'',''brightness'') | int(0) }}'
      brightness_final: '{{ brightness | default(b if b > 0 else 128) | int }}'
  - choose:
    - conditions: '{{ rgb is defined and rgb is not none }}'
      sequence:
      - target:
          entity_id: light.tristan_right_bedside
        data:
          rgb_color: '{{ rgb }}'
          brightness: '{{ brightness_final | int }}'
        action: light.turn_on
    - conditions: '{{ kelvin is defined and kelvin is not none }}'
      sequence:
      - target:
          entity_id: light.tristan_right_bedside
        data:
          color_temp_kelvin: '{{ kelvin | int }}'
          brightness: '{{ brightness_final | int }}'
        action: light.turn_on
apply_living_room_light_profile:
  alias: Living Room - Light Apply Profile
  icon: mdi:lightbulb-group
  mode: restart
  fields:
    profile:
      description: Preset name (nightlight/relax/day/focus)
      example: relax
  sequence:
  - variables:
      p: '{{ (profile | default(''relax'')) | lower }}'
      presets:
        nightlight:
          brightness_pct: 8
          kelvin: 2200
        relax:
          brightness_pct: 45
          kelvin: 2700
        day:
          brightness_pct: 70
          kelvin: 3500
        focus:
          brightness_pct: 100
          kelvin: 5000
      s: '{{ presets.get(p, presets.relax) }}'
  - target:
      entity_id: light.living_room_lights
    data:
      transition: 0.6
      brightness_pct: '{{ s.brightness_pct }}'
      color_temp_kelvin: '{{ s.kelvin }}'
    action: light.turn_on
