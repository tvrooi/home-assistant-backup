apply_tristan_room_scene:
  alias: Apply Tristan Room Scene
  mode: restart
  fields:
    preset_id:
      description: Scene Preset ID
    scene_name:
      description: Human-readable scene name
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.tristan_active_scene
    data:
      value: '{{ scene_name }}'
  - if:
    - condition: state
      entity_id: input_boolean.tristan_scene_dynamic
      state: 'on'
    then:
    - if:
      - condition: state
        entity_id: input_boolean.tristan_scene_light_left
        state: 'on'
      then:
      - action: scene_presets.start_dynamic_scene
        data:
          preset_id: '{{ preset_id }}'
          targets:
            entity_id: light.tristan_left_bedside
          transition: '{{ states(''input_number.tristan_scene_transition'') | int
            }}'
          interval: '{{ states(''input_number.tristan_scene_interval'') | int }}'
    - if:
      - condition: state
        entity_id: input_boolean.tristan_scene_light_right
        state: 'on'
      then:
      - action: scene_presets.start_dynamic_scene
        data:
          preset_id: '{{ preset_id }}'
          targets:
            entity_id: light.tristan_right_bedside
          transition: '{{ states(''input_number.tristan_scene_transition'') | int
            }}'
          interval: '{{ states(''input_number.tristan_scene_interval'') | int }}'
    - if:
      - condition: state
        entity_id: input_boolean.tristan_scene_light_desk
        state: 'on'
      then:
      - action: scene_presets.start_dynamic_scene
        data:
          preset_id: '{{ preset_id }}'
          targets:
            entity_id: light.tristan_desk_colour
          transition: '{{ states(''input_number.tristan_scene_transition'') | int
            }}'
          interval: '{{ states(''input_number.tristan_scene_interval'') | int }}'
    else:
    - if:
      - condition: state
        entity_id: input_boolean.tristan_scene_light_left
        state: 'on'
      then:
      - action: scene_presets.apply_preset
        data:
          preset_id: '{{ preset_id }}'
          targets:
            entity_id: light.tristan_left_bedside
          shuffle: false
          smart_shuffle: false
      - if:
        - condition: state
          entity_id: input_boolean.tristan_scene_custom_brightness
          state: 'on'
        then:
        - action: light.turn_on
          target:
            entity_id: light.tristan_left_bedside
          data:
            brightness_pct: '{{ states(''input_number.tristan_scene_brightness'')
              | int }}'
            transition: '{{ states(''input_number.tristan_scene_transition'') | float
              }}'
    - if:
      - condition: state
        entity_id: input_boolean.tristan_scene_light_right
        state: 'on'
      then:
      - action: scene_presets.apply_preset
        data:
          preset_id: '{{ preset_id }}'
          targets:
            entity_id: light.tristan_right_bedside
          shuffle: false
          smart_shuffle: false
      - if:
        - condition: state
          entity_id: input_boolean.tristan_scene_custom_brightness
          state: 'on'
        then:
        - action: light.turn_on
          target:
            entity_id: light.tristan_right_bedside
          data:
            brightness_pct: '{{ states(''input_number.tristan_scene_brightness'')
              | int }}'
            transition: '{{ states(''input_number.tristan_scene_transition'') | float
              }}'
    - if:
      - condition: state
        entity_id: input_boolean.tristan_scene_light_desk
        state: 'on'
      then:
      - action: scene_presets.apply_preset
        data:
          preset_id: '{{ preset_id }}'
          targets:
            entity_id: light.tristan_desk_colour
          shuffle: false
          smart_shuffle: false
      - if:
        - condition: state
          entity_id: input_boolean.tristan_scene_custom_brightness
          state: 'on'
        then:
        - action: light.turn_on
          target:
            entity_id: light.tristan_desk_colour
          data:
            brightness_pct: '{{ states(''input_number.tristan_scene_brightness'')
              | int }}'
            transition: '{{ states(''input_number.tristan_scene_transition'') | float
              }}'
    - if:
      - condition: state
        entity_id: input_boolean.tristan_scene_custom_brightness
        state: 'off'
      then:
      - delay:
          seconds: '{{ [states(''input_number.tristan_scene_transition'') | float
            | round(0) | int + 1, 2] | max }}'
      - variables:
          synced_brightness: "{% if is_state('input_boolean.tristan_scene_light_left',
            'on') and state_attr('light.tristan_left_bedside', 'brightness') %}\n
            \ {{ (state_attr('light.tristan_left_bedside', 'brightness') / 255 * 100)
            | round(0) | int }}\n{% elif is_state('input_boolean.tristan_scene_light_right',
            'on') and state_attr('light.tristan_right_bedside', 'brightness') %}\n
            \ {{ (state_attr('light.tristan_right_bedside', 'brightness') / 255 *
            100) | round(0) | int }}\n{% elif is_state('input_boolean.tristan_scene_light_desk',
            'on') and state_attr('light.tristan_desk_colour', 'brightness') %}\n  {{
            (state_attr('light.tristan_desk_colour', 'brightness') / 255 * 100) |
            round(0) | int }}\n{% else %}\n  50\n{% endif %}\n"
      - action: input_number.set_value
        target:
          entity_id: input_number.tristan_scene_brightness
        data:
          value: '{{ synced_brightness }}'
stop_tristan_room_scene:
  alias: Stop Tristan Room Scene
  icon: mdi:stop-circle-outline
  sequence:
  - service: script.turn_off
    target:
      entity_id: script.apply_tristan_room_scene
  - service: input_text.set_value
    target:
      entity_id: input_text.tristan_active_scene
    data:
      value: ''
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.tristan_scene_dynamic
  mode: single
