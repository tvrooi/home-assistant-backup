light_color_temp_helper_2:
  alias: Light Color Temp Helper
  description: Switch color temperature of light in steps
  mode: queued
  fields:
    target_light:
      name: Light
      description: Light entity to adjust
      required: true
      selector:
        entity:
          filter:
            domain: light
    min_color_temp:
      name: Minimum Color Temperature (K)
      default: 2200
      required: true
      selector:
        number:
          mode: box
          min: 1000
          max: 10000
          step: 50
    max_color_temp:
      name: Maximum Color Temperature (K)
      default: 4000
      required: true
      selector:
        number:
          mode: box
          min: 1000
          max: 10000
          step: 50
    color_temp_step:
      name: Color Temperature Step (K)
      default: 300
      required: true
      selector:
        number:
          mode: box
          min: 50
          max: 2000
          step: 50
    mode:
      name: Mode
      description: up/down/cycle
      default: cycle
      required: true
      selector:
        select:
          options:
          - up
          - down
          - cycle
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: '{% set modes = state_attr(target_light, ''supported_color_modes'')
          %} {{ modes is not none and ''color_temp'' in modes }}'
      sequence:
      - target:
          entity_id: '{{ target_light }}'
        data:
          color_temp_kelvin: "{% set current = state_attr(target_light, 'color_temp_kelvin')
            %} {% set min_k = (min_color_temp | int) %} {% set max_k = (max_color_temp
            | int) %} {% set step = (color_temp_step | int) %} {% set m = (mode |
            string) %} {% if current is none %}\n  {{ max_k }}\n{% else %}\n  {% if
            m == 'cycle' and (current | int) >= max_k %}\n    {{ min_k }}\n  {% else
            %}\n    {% set delta = step if m != 'down' else -step %}\n    {% set new_value
            = (current | int) + delta %}\n    {{ [ [new_value, max_k] | min, min_k
            ] | max }}\n  {% endif %}\n{% endif %}"
        action: light.turn_on
    default: []
