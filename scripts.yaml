juno_dynamic_scene_start:
  alias: Juno Bedroom - Dynamic Scene Start
  icon: mdi:motion-play
  mode: restart
  description: Animated lighting cycle
  sequence:
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.juno_dynamic_scene
  - repeat:
      while:
      - condition: state
        entity_id: input_boolean.juno_dynamic_scene
        state: 'on'
      sequence:
      - service: light.turn_on
        target:
          entity_id: light.juno_room
        data:
          brightness_pct: 45
          color_temp_kelvin: 2300
          transition: 6
      - delay: 00:00:25
      - service: light.turn_on
        target:
          entity_id: light.juno_room
        data:
          brightness_pct: 70
          color_temp_kelvin: 3200
          transition: 6
      - delay: 00:00:25
      - service: light.turn_on
        target:
          entity_id: light.juno_room
        data:
          brightness_pct: 85
          color_temp_kelvin: 4000
          transition: 6
      - delay: 00:00:25
      - service: light.turn_on
        target:
          entity_id: light.juno_room
        data:
          brightness_pct: 35
          color_temp_kelvin: 2202
          transition: 8
      - delay: 00:00:25
juno_dynamic_scene_stop:
  alias: Juno Bedroom - Dynamic Scene Stop
  icon: mdi:motion-pause
  mode: single
  sequence:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.juno_dynamic_scene
