juno_adaptive_apply_now:
  alias: Juno Bedroom - Adaptive Lighting Apply Now
  icon: mdi:refresh
  mode: restart
  sequence:
  - condition: state
    entity_id: input_boolean.juno_adaptive
    state: 'on'
  - choose:
    - conditions:
      - condition: time
        after: 07:00:00
        before: '12:00:00'
      sequence:
      - service: light.turn_on
        target:
          entity_id: light.juno_room
        data:
          brightness_pct: 85
          color_temp_kelvin: 3800
          transition: 3
    - conditions:
      - condition: time
        after: '12:00:00'
        before: '17:30:00'
      sequence:
      - service: light.turn_on
        target:
          entity_id: light.juno_room
        data:
          brightness_pct: 100
          color_temp_kelvin: 4000
          transition: 3
    - conditions:
      - condition: time
        after: '17:30:00'
        before: '21:30:00'
      sequence:
      - service: light.turn_on
        target:
          entity_id: light.juno_room
        data:
          brightness_pct: 60
          color_temp_kelvin: 3000
          transition: 4
    - conditions:
      - condition: time
        after: '21:30:00'
        before: '23:59:59'
      sequence:
      - service: light.turn_on
        target:
          entity_id: light.juno_room
        data:
          brightness_pct: 35
          color_temp_kelvin: 2400
          transition: 6
    default:
    - service: light.turn_on
      target:
        entity_id: light.juno_room
      data:
        brightness_pct: 15
        color_temp_kelvin: 2202
        transition: 8
