custom_select:
  name: Custom dropdown (Labels, icons, colors, actions...)
  version: v1.2.0
  creator: Clooos
  description: |
    This module lets you customize the labels, icons, and icon colors of dropdown items, and also allows you to define actions or add navigation to pop-ups or dashboard pages. It works for both the main select card and sub-buttons in supported cards.<br><br>

    <img class="example" src="https://github.com/Clooos/Bubble-Card/blob/main/img/custom_dropdown_module.png?raw=true" />

    <b>Example use cases</b><br><br>

    <b>Quick controls:</b> Create a dropdown where each option opens a different pop-up: one for lights, one for media, one for climate...<br><br>

    <b>Vacuum room selector:</b> Set up a dropdown for your robot vacuum, where each item represents a room like “Kitchen”, “Living Room”, or “Bedroom”. Selecting an option sends a service call to clean only the selected area.<br><br>

    <b>Color picker:</b> Build a dropdown for a light entity, with each item showing a colored icon and label like “Warm White”, “Cool White”, or “Red”. Selecting an option sends a command to instantly change the light color.<br><br>

    <p>
    <b>YAML example:</b> Color picker from the screenshot:
    </p>
    <br>
    <code-block><pre>
    variables:
      # For this example, create a template input_select (in Helpers) with 9 options (named 1, 2, 3...) 
      # Replace "light.your_entity" and "input_select.your_entity" below
      light_entity: &light_entity light.your_entity
      select_entity: &select_entity input_select.your_entity
    custom_select:
      sub_button_1:
        - position: 1
          name: Select a color
          icon: mdi:palette-outline
        - position: 2
          name: Warm White
          icon: mdi:circle
          color: "#FFD9B3"
          action:
            - action: light.turn_on
