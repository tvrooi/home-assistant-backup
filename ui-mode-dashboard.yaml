            \ -%}, {{user}}"
          card_mod:
            style: ":host {\n  flex: 1 1 0 !important;\n}\nha-card {\n  background:\
              \ transparent !important;\n  box-shadow: none !important;\n}\n"
      - type: horizontal-stack
