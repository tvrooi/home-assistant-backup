    - type: custom:mushroom-chips-card
      alignment: justify
      chips:
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
        - type: conditional
          conditions:
          - entity: binary_sensor.any_lights_on
            state: 'on'
          chip:
            type: template
            icon: mdi:lightbulb-group
            icon_color: amber
            content: "{% set lights_on = states.light\n  | selectattr('state', 'eq',\
              \ 'on')\n  | rejectattr('entity_id', 'is_hidden_entity')\n  | list %}\n\
              {{ lights_on | count }} on\n"
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: Lights currently on
                  dismissable: true
                  content:
                    type: custom:auto-entities
                    card:
                      type: entities
                      show_header_toggle: false
                      state_color: true
                    filter:
                      template: "{% set ns = namespace(items=[], assigned=[]) %}\n\
                        {% set lights_on = states.light\n  | selectattr('state', 'eq',\
                        \ 'on')\n  | rejectattr('entity_id', 'is_hidden_entity')\n\
                        \  | map(attribute='entity_id')\n  | list\n  | sort %}\n\n\
                        {% set rooms = lights_on\n  | map('area_name')\n  | reject('none')\n\
                        \  | reject('equalto', '')\n  | unique\n  | list\n  | sort\
                        \ %}\n\n{% for room in rooms %}\n  {% set room_lights = area_entities(room)\n\
                        \    | select('match', '^light\\\\.')\n    | reject('is_hidden_entity')\n\
                        \    | select('in', lights_on)\n    | list\n    | sort %}\n\
                        \n  {% if room_lights | count > 0 %}\n    {% set ns.items\
                        \ = ns.items + [{'type': 'section', 'label': room}] %}\n \
                        \   {% for eid in room_lights %}\n      {% set ns.items =\
                        \ ns.items + [{'entity': eid}] %}\n      {% set ns.assigned\
                        \ = ns.assigned + [eid] %}\n    {% endfor %}\n  {% endif %}\n\
                        {% endfor %}\n{% set unassigned = lights_on\n  | reject('in',\
                        \ ns.assigned)\n  | list\n  | sort %}\n\n{% if unassigned\
                        \ | count > 0 %}\n  {% set ns.items = ns.items + [{'type':\
                        \ 'section', 'label': 'Unassigned'}] %}\n  {% for eid in unassigned\
                        \ %}\n    {% set ns.items = ns.items + [{'entity': eid}] %}\n\
                        \  {% endfor %}\n{% endif %}\n{{ ns.items }}\n"
                    show_empty: false
                    else:
                      type: markdown
                      content: No lights are on.
