                    \ 'on') and desk_rgb %}\n  {% set ns.r = desk_rgb[0]|int %}{%\
                    \ set ns.g = desk_rgb[1]|int %}{% set ns.b = desk_rgb[2]|int %}\n\
                    {% else %}\n  {% set h = now().hour %}\n  {% if h >= 5 and h <\
                    \ 9 %}{% set ns.r = 255 %}{% set ns.g = 140 %}{% set ns.b = 60\
                    \ %}\n  {% elif h >= 9 and h < 12 %}{% set ns.r = 135 %}{% set\
                    \ ns.g = 206 %}{% set ns.b = 235 %}\n  {% elif h >= 12 and h <\
                    \ 16 %}{% set ns.r = 255 %}{% set ns.g = 215 %}{% set ns.b = 80\
                    \ %}\n  {% elif h >= 16 and h < 19 %}{% set ns.r = 255 %}{% set\
                    \ ns.g = 120 %}{% set ns.b = 40 %}\n  {% elif h >= 19 and h <\
