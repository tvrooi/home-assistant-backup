                    \ %}\n  {% endif %}\n{% endif %}\nha-card {\n  background: none\
                    \ !important;\n  border: none !important;\n  box-shadow: none\
                    \ !important;\n  border-radius: 0 !important;\n  padding: 0 14px\
                    \ 14px 14px;\n  position: relative;\n  z-index: 0;\n}\nha-card::before\
