            style: ":host {\n  padding-top: 6px;\n  padding-left: 10px;\n  padding-bottom:\
              \ 18px;\n  --ha-card-background: transparent;\n}\nha-card {\n  background:\
              \ transparent !important;\n  box-shadow: none !important;\n}\n"
