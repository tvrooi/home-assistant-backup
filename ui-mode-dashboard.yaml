                    \ 'on') and left_rgb %}\n  {% set ns.r = left_rgb[0]|int %}{%\
                    \ set ns.g = left_rgb[1]|int %}{% set ns.b = left_rgb[2]|int %}\n\
                    {% elif is_state('light.tristan_right_bedside', 'on') and right_rgb\
                    \ %}\n  {% set ns.r = right_rgb[0]|int %}{% set ns.g = right_rgb[1]|int\
