        - title: Music
          icon: mdi:music-note
          id: tristantab3
          card:
            type: custom:maxi-media-player
            entity: media_player.tristans_wifi
            entities:
            - media_player.tristans_wifi
            sections:
            - player
            - media_browser
            player:
              artworkAsBackground: true
              artworkAsBackgroundBlur: 26
              hideEntityName: true
              hideHeader: true
              showSource: false
              showVolumeUpAndDownButtons: false
              showSleepTimer: true
            mediaBrowser:
              itemsPerRow: 2
              tabs:
              - type: favorites
                title: Favourites
                icon: mdi:heart
              - type: search
                title: Search
                icon: mdi:magnify
              - type: library
                title: Browse
                icon: mdi:music-box-multiple
        - title: Alarm
          icon: mdi:alarm-multiple
          id: tristantab4
          cards:
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: input_boolean.tristan_alarm_enabled
            name: Wake Up Alarm
            icon: mdi:alarm
            show_state: true
            sub_button:
              main: []
              bottom: []
            use_accent_color: false
            modules:
            - '!default'
            - frosted_glass
            frosted_glass:
              main_icon_color_boolean: icon_theme_color
              icon_background: theme
              border_radius: 32
              blur: 32
              shadow:
                main_shadow_style: main_shadow_liquid
                icon_shadow_style: icon_shadow_liquid
                sub_shadow_style: sub_shadow_liquid
              gradient:
                gradient_type: gradient_off
            card_layout: large
            show_icon: true
          - type: custom:time-picker-card
            entity: input_datetime.tristan_wake_time
            hour_mode: 24
            hour_step: 1
            minute_step: 5
            layout:
              hour_mode: double
              align_controls: center
              name: inside
              thin: true
              embedded: true
            hide:
              seconds: true
              name: true
              icon: true
            link_values: true
            card_mod:
              style: "ha-card {\n  background: rgba(255, 255, 255, 0.12) !important;\n\
                \  backdrop-filter: blur(32px) !important;\n  -webkit-backdrop-filter:\
                \ blur(32px) !important;\n  border-radius: 32px !important;\n  border:\
                \ 1px solid rgba(255, 255, 255, 0.2) !important;\n  box-shadow: 0\
                \ 8px 32px 0 rgba(0, 0, 0, 0.25) !important;\n  padding: 8px 0 !important;\n\
                }\n.time-picker__value {\n  background: rgba(255, 255, 255, 0.15)\
                \ !important;\n  border-radius: 16px !important;\n  font-size: 2.2rem\
                \ !important;\n  font-weight: 600 !important;\n  color: var(--primary-text-color)\
                \ !important;\n  min-width: 80px !important;\n  padding: 12px 16px\
                \ !important;\n}\n.time-picker__button {\n  color: var(--primary-text-color)\
                \ !important;\n  opacity: 0.7 !important;\n}\n.time-picker__separator\
                \ {\n  font-size: 2.2rem !important;\n  font-weight: 600 !important;\n\
                \  color: var(--primary-text-color) !important;\n}\n"
