          entity_id: light.backyard_light
        data:
          transition: 1
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.backyard_light_manual_off
      action_on_double:
      - variables:
          light_target: light.backyard_light
          step_k: 200
          trans: 0.7
          cur_k: '{{ state_attr(light_target, ''color_temp_kelvin'') | int(2700) }}'
          min_k: '{{ state_attr(light_target, ''min_color_temp_kelvin'') | int(2000)
            }}'
          max_k: '{{ state_attr(light_target, ''max_color_temp_kelvin'') | int(6500)
            }}'
          new_k: '{% set v = cur_k + step_k %} {% if v < min_k %}{{ min_k }} {% elif
            v > max_k %}{{ max_k }} {% else %}{{ v }} {% endif %}'
      - action: light.turn_on
        target:
          entity_id: '{{ light_target }}'
        data:
          transition: '{{ trans }}'
          color_temp_kelvin: '{{ new_k }}'
      action_off_double:
      - variables:
          light_target: light.backyard_light
          step_k: 200
          trans: 0.7
          cur_k: '{{ state_attr(light_target, ''color_temp_kelvin'') | int(2700) }}'
          min_k: '{{ state_attr(light_target, ''min_color_temp_kelvin'') | int(2000)
            }}'
          max_k: '{{ state_attr(light_target, ''max_color_temp_kelvin'') | int(6500)
            }}'
          new_k: '{% set v = cur_k - step_k %} {% if v < min_k %}{{ min_k }} {% elif
            v > max_k %}{{ max_k }} {% else %}{{ v }} {% endif %}'
      - action: light.turn_on
        target:
          entity_id: '{{ light_target }}'
        data:
          transition: '{{ trans }}'
          color_temp_kelvin: '{{ new_k }}'
      action_up:
      - repeat:
          while:
          - condition: template
            value_template: '{{ true }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.backyard_light
            data:
              brightness_step_pct: 5
              transition: 0.25
          - delay:
              seconds: 0.25
      action_down:
      - repeat:
          while:
          - condition: template
            value_template: '{{ true }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.backyard_light
            data:
              brightness_step_pct: -5
              transition: 0.25
          - delay:
              seconds: 0.25
      action_stop: []
- id: '1771327969677'
  alias: Laundry light with door (only when dark)
  description: ''
  triggers:
  - entity_id:
    - binary_sensor.laundry_door_contact
    to:
    - 'on'
    id: opened
    trigger: state
  - entity_id:
    - binary_sensor.laundry_door_contact
    to:
    - 'off'
    id: closed
    trigger: state
  conditions:
  - condition: numeric_state
    entity_id: sun.sun
    attribute: elevation
    below: 5
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: opened
      sequence:
      - target:
          entity_id: light.laundry_light
        action: light.turn_on
    - conditions:
      - condition: trigger
        id: closed
      sequence:
      - delay: 00:01:00
      - target:
          entity_id: light.laundry_light
        action: light.turn_off
  mode: restart
- id: '1771328071946'
  alias: Backyard light - door/sunset control
  description: Auto-on when door opens or sun sets while door is open (respects manual-off
    latch). Auto-off and reset latch when door closes.
  triggers:
  - platform: state
    entity_id: binary_sensor.backyard_door_contact
    to: 'on'
    id: door_opened
  - platform: state
    entity_id: binary_sensor.backyard_door_contact
    to: 'off'
    id: door_closed
  - platform: state
    entity_id: sun.sun
    to: below_horizon
    id: sun_set
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: door_opened
      - condition: state
        entity_id: sun.sun
        state: below_horizon
      - condition: state
        entity_id: input_boolean.backyard_light_manual_off
        state: 'off'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.backyard_light
        data:
          brightness_pct: 100
          transition: 0.5
    - conditions:
      - condition: trigger
        id: sun_set
      - condition: state
        entity_id: binary_sensor.backyard_door_contact
        state: 'on'
      - condition: state
        entity_id: input_boolean.backyard_light_manual_off
        state: 'off'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.backyard_light
        data:
          brightness_pct: 100
          transition: 0.5
    - conditions:
      - condition: trigger
        id: door_closed
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.backyard_light
        data:
          transition: 0.5
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.backyard_light_manual_off
  mode: restart
- id: '1771334187123'
  alias: 'Wake time: sliders → input_datetime'
  description: ''
  triggers:
  - entity_id:
    - input_number.tristan_wake_hour
    - input_number.tristan_wake_minute
    trigger: state
  actions:
  - target:
      entity_id: input_datetime.tristan_wake_time
    data:
      time: '{% set h = states(''input_number.tristan_wake_hour'')|int(0) %} {% set
        m = states(''input_number.tristan_wake_minute'')|int(0) %} {{ "%02d:%02d:00"
        | format(h, m) }}

        '
    action: input_datetime.set_datetime
  mode: single
- id: '1771334205579'
  alias: 'Wake time: input_datetime → sliders'
  description: ''
  triggers:
  - event: start
    trigger: homeassistant
  - entity_id: input_datetime.tristan_wake_time
    trigger: state
  actions:
  - variables:
      t: '{{ states(''input_datetime.tristan_wake_time'') }}'
      h: '{{ (t[0:2]|int(0)) if t|length >= 5 else 0 }}'
      m: '{{ (t[3:5]|int(0)) if t|length >= 5 else 0 }}'
      m5: '{{ (m // 5) * 5 }}'
  - target:
      entity_id: input_number.tristan_wake_hour
    data:
      value: '{{ h }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.tristan_wake_minute
    data:
      value: '{{ m5 }}'
    action: input_number.set_value
  mode: single
- id: '1771400516309'
  alias: Tristan Bedroom - Coordinate Adaptive Lighting vs Dynamic Scene
  description: Turns Adaptive Lighting off when Dynamic Scene is enabled, and turns
    it back on when Dynamic Scene is disabled.
  triggers:
  - entity_id: input_boolean.tristan_dynamic_scene
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.tristan_dynamic_scene
        state: 'on'
      sequence:
      - target:
          entity_id: switch.adaptive_lighting_tristan_bedroom
        action: switch.turn_off
    - conditions:
      - condition: state
        entity_id: input_boolean.tristan_dynamic_scene
        state: 'off'
