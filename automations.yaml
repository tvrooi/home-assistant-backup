- id: '1769522262161'
  alias: Wake-up lamp sunrise (Weekdays)
  description: ''
  triggers:
  - value_template: '{% set h = states(''input_number.tristan_wake_hour'')|int(0)
      %} {% set m = states(''input_number.tristan_wake_minute'')|int(0) %} {% set
      wake = today_at("%02d:%02d:00" | format(h, m)) %} {{ now() >= (wake - timedelta(minutes=15))
      and now() < (wake - timedelta(minutes=15) + timedelta(seconds=1)) }}

      '
    trigger: template
  conditions:
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.tristan_bedroom_lights
    data:
      brightness_pct: 1
  - delay: 00:00:02
  - action: light.turn_on
    data:
      brightness_pct: 70
      transition: 900
    target:
      entity_id: light.tristan_bedroom_lights
  mode: single
- alias: Front sprinkler - turn off when timer finishes
  mode: single
  trigger:
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: timer.front_sprinkler
  action:
  - service: switch.turn_off
    target:
      entity_id: switch.front_water_valve
  id: 06b6cfc04bf74b4bb5f6b4e0a5784e6c
- alias: Front sprinkler - cancel timer if valve turned off
  mode: single
  trigger:
  - platform: state
    entity_id: switch.front_water_valve
    to: 'off'
  action:
  - service: timer.cancel
    target:
      entity_id: timer.front_sprinkler
  id: 39c231f7f56849b1bc70035c06a0d872
- id: '1771327852109'
  alias: Dining Switch
  description: ''
  use_blueprint:
    path: masanos1/Bilresa Z2M.yaml
    input:
      remote_device: 506f530320bdbf23af4594c4e7adf9c2
      action_on:
      - action: light.turn_on
        target:
          entity_id: light.dining_room_floor_lamp
        data:
          transition: 1
          color_temp_kelvin: 2702
          brightness_pct: 70
      action_off:
      - action: light.turn_off
        target:
          entity_id: light.dining_room_floor_lamp
        data:
          transition: 1
      action_on_double:
      - variables:
          light_target: light.dining_room_floor_lamp
          step_k: 200
          trans: 0.7
          cur_k: '{{ state_attr(light_target, ''color_temp_kelvin'') | int(2700) }}'
          min_k: '{{ state_attr(light_target, ''min_color_temp_kelvin'') | int(2000)
            }}'
          max_k: '{{ state_attr(light_target, ''max_color_temp_kelvin'') | int(6500)
            }}'
          new_k: '{% set v = cur_k + step_k %} {% if v < min_k %}{{ min_k }} {% elif
            v > max_k %}{{ max_k }} {% else %}{{ v }} {% endif %}'
      - action: light.turn_on
        target:
          entity_id: '{{ light_target }}'
        data:
          transition: '{{ trans }}'
          color_temp_kelvin: '{{ new_k }}'
      action_off_double:
      - variables:
          light_target: light.dining_room_floor_lamp
          step_k: 200
          trans: 0.7
          cur_k: '{{ state_attr(light_target, ''color_temp_kelvin'') | int(2700) }}'
          min_k: '{{ state_attr(light_target, ''min_color_temp_kelvin'') | int(2000)
            }}'
          max_k: '{{ state_attr(light_target, ''max_color_temp_kelvin'') | int(6500)
            }}'
          new_k: '{% set v = cur_k - step_k %} {% if v < min_k %}{{ min_k }} {% elif
            v > max_k %}{{ max_k }} {% else %}{{ v }} {% endif %}'
      - action: light.turn_on
        target:
          entity_id: '{{ light_target }}'
        data:
          transition: '{{ trans }}'
          color_temp_kelvin: '{{ new_k }}'
      action_up:
      - repeat:
          while:
          - condition: template
            value_template: '{{ true }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.dining_room_floor_lamp
            data:
              brightness_step_pct: 2
              transition: 0.35
          - delay:
              seconds: 0.35
      action_down:
      - repeat:
          while:
          - condition: template
            value_template: '{{ true }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.dining_room_floor_lamp
            data:
              brightness_step_pct: -2
              transition: 0.35
          - delay:
              seconds: 0.35
      action_stop: []
- id: '1771327911280'
