- id: '1771632870595'
  alias: Bathroom Occupancy Smart Sensor
  description: Latches occupied when motion detected with door closed. Ignores motion
    clearing while door stays shut — only resets when door opens. On door close, waits
    30s for motion before deciding unoccupied.
  triggers:
  - platform: state
    entity_id: binary_sensor.bathroom_door_contact
    to: 'on'
    id: door_opened
  - platform: state
    entity_id: binary_sensor.bathroom_door_contact
    to: 'off'
    id: door_closed
  - platform: state
    entity_id: binary_sensor.bathroom_occupancy_occupancy
    to: 'on'
    id: motion_detected
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: door_opened
      sequence:
      - target:
          entity_id: input_boolean.bathroom_occupancy
        action: input_boolean.turn_off
    - conditions:
      - condition: trigger
        id: motion_detected
      - condition: state
        entity_id: binary_sensor.bathroom_door_contact
        state: 'off'
      sequence:
      - target:
          entity_id: input_boolean.bathroom_occupancy
        action: input_boolean.turn_on
    - conditions:
      - condition: trigger
        id: door_closed
      sequence:
      - wait_for_trigger:
        - platform: state
          entity_id: binary_sensor.bathroom_occupancy_occupancy
          to: 'on'
        timeout:
          seconds: 30
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ wait.completed }}'
          - condition: state
            entity_id: binary_sensor.bathroom_door_contact
            state: 'off'
          sequence:
          - target:
              entity_id: input_boolean.bathroom_occupancy
            action: input_boolean.turn_on
        default:
        - target:
            entity_id: input_boolean.bathroom_occupancy
          action: input_boolean.turn_off
  mode: parallel
  max: 5
- id: '1772016799328'
  alias: UI Graph Toggles - Auto Off (1 min)
