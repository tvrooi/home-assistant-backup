    entity_id: binary_sensor.living_occupancy_occupancy
    to: 'on'
  conditions:
  - condition: or
    conditions:
    - condition: time
      after: '23:00:00'
    - condition: sun
      before: sunrise
  actions:
  - action: light.turn_on
    target:
      entity_id: light.living_orb
    data:
      brightness_pct: 5
      color_temp_kelvin: 2202
  - wait_for_trigger:
    - platform: state
      entity_id: binary_sensor.living_occupancy_occupancy
      to: 'off'
      for:
        minutes: 2
    timeout:
      hours: 1
    continue_on_timeout: true
  - action: light.turn_off
    target:
      entity_id: light.living_orb
  mode: restart
- id: '1772453280125'
  alias: Living Room Orb App Override
  description: When the orb is toggled via the HA app or UI (detected by user_id in
    context), disable or re-enable the motion nightlight automation so manual control
    persists.
  triggers:
  - platform: state
    entity_id: light.living_orb
    to: 'on'
    id: turned_on
  - platform: state
    entity_id: light.living_orb
    to: 'off'
    id: turned_off
  conditions:
  - condition: template
    value_template: '{{ trigger.to_state.context.user_id is not none }}'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: turned_on
      sequence:
      - action: automation.turn_off
        target:
          entity_id: automation.living_room_orb_nightlight
    - conditions:
      - condition: trigger
        id: turned_off
      sequence:
      - action: automation.turn_on
        target:
          entity_id: automation.living_room_orb_nightlight
  mode: single
- id: '1772529143760'
  alias: Sync Bedside Lamps - Left to Right
  description: When left bedside brightness or color temp changes, sync to right bedside
    (unless in color mode or scene is active)
  triggers:
  - platform: state
    entity_id: light.tristan_left_bedside
    attribute: brightness
    id: brightness_change
  - platform: state
    entity_id: light.tristan_left_bedside
    attribute: color_temp_kelvin
    id: temp_change
  conditions:
  - condition: state
    entity_id: light.tristan_left_bedside
    state: 'on'
  - condition: state
    entity_id: light.tristan_right_bedside
    state: 'on'
  - condition: template
    value_template: '{{ state_attr(''light.tristan_right_bedside'', ''color_mode'')
      == ''color_temp'' }}'
  - condition: state
    entity_id: input_boolean.tristan_dynamic_scene
    state: 'off'
  actions:
  - target:
      entity_id: light.tristan_right_bedside
    data:
      brightness: '{{ state_attr(''light.tristan_left_bedside'', ''brightness'') }}'
      color_temp_kelvin: '{{ state_attr(''light.tristan_left_bedside'', ''color_temp_kelvin'')
        }}'
    action: light.turn_on
  mode: restart
- id: '1772529155101'
  alias: Sync Bedside Lamps - Right to Left
  description: When right bedside brightness or color temp changes, sync to left bedside
    (unless in color mode or scene is active)
  triggers:
  - platform: state
    entity_id: light.tristan_right_bedside
    attribute: brightness
    id: brightness_change
  - platform: state
    entity_id: light.tristan_right_bedside
    attribute: color_temp_kelvin
    id: temp_change
  conditions:
  - condition: state
    entity_id: light.tristan_left_bedside
    state: 'on'
  - condition: state
    entity_id: light.tristan_right_bedside
    state: 'on'
  - condition: template
    value_template: '{{ state_attr(''light.tristan_right_bedside'', ''color_mode'')
      == ''color_temp'' }}'
  - condition: state
    entity_id: input_boolean.tristan_dynamic_scene
    state: 'off'
  actions:
  - target:
      entity_id: light.tristan_left_bedside
    data:
      brightness: '{{ state_attr(''light.tristan_right_bedside'', ''brightness'')
        }}'
      color_temp_kelvin: '{{ state_attr(''light.tristan_right_bedside'', ''color_temp_kelvin'')
        }}'
    action: light.turn_on
  mode: restart
- id: sensor_light_hallway
  alias: Sensor Light Hallway (Nightlight 1% 11pm–sunrise)
  description: Motion-activated hallway nightlight at 1% brightness, active from 11pm
    until sunrise.
  triggers:
  - entity_id:
    - binary_sensor.hallway_motion_presence
    to:
    - 'on'
    trigger: state
  conditions:
  - condition: time
    after: '23:00:00'
  - condition: sun
    before: sunrise
  actions:
  - data:
      brightness_pct: 1
    action: light.turn_on
    target:
      entity_id: light.hallway_pendant
  - wait_for_trigger:
    - entity_id: binary_sensor.hallway_motion
      to: 'off'
      for: 00:02:00
      trigger: state
  - action: light.turn_off
    data: {}
    target:
      entity_id: light.hallway_pendant
  mode: restart
- id: '1772764849530'
  alias: Washing Machine - Cycle Complete
  description: Notify all users and announce to home when the washing machine cycle
    finishes
  triggers:
  - platform: state
    entity_id: binary_sensor.laundry_washing_end_of_cycle
    to: 'on'
  actions:
  - parallel:
    - data:
        title: "\U0001F9FA Washing Done"
        message: The washing machine cycle has finished. Time to move the laundry!
      action: notify.mobile_app_tristans_phone
    - data:
        title: "\U0001F9FA Washing Done"
        message: The washing machine cycle has finished. Time to move the laundry!
      action: notify.mobile_app_tristans_ipad
    - data:
        title: "\U0001F9FA Washing Done"
        message: The washing machine cycle has finished. Time to move the laundry!
      action: notify.mobile_app_juno_iphone
    - data:
        title: "\U0001F9FA Washing Done"
        message: The washing machine cycle has finished. Time to move the laundry!
      action: notify.mobile_app_zephyrs_iphone
    - sequence:
      - data:
          entity_id:
          - media_player.dining_room_wifi
